services:
  redis:
    container_name: django_redis
    image: redis:8.4.2-alpine
    ports:
      - "6379:6379"
  redisinsight:
    image: redis/redisinsight
    container_name: django_redis_insight
    # restart: always
    depends_on:
      - redis
    ports:
      - "5540:5540"
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
  django:
    container_name: django
    build:
      context: .
    working_dir: /usr/src/app
    command: python3 manage.py runserver 0.0.0.0:8000
    volumes:
      - ./:/usr/src/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - DEBUG=1
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - SECRET_KEY=django-insecure-d(6uy^hz=h_yoj4nnvdu%--a7r&sxz!3jh^z0t^eo243@w^h+h
  x-celery-base: &celery-base
    build:
      context: .
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
    depends_on:
      - redis
      - django
      - rabbitmq
    environment:
      - DEBUG=1
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - SECRET_KEY=django-insecure-d(6uy^hz=h_yoj4nnvdu%--a7r&sxz!3jh^z0t^eo243@w^h+h
  celery:
    <<: *celery-base
    command: celery -A app worker --loglevel=info -Q tasks
